# SALTO Battery Monitor — local dev / on-prem Linux stack.
#
#   docker compose up -d --build
#   open http://localhost:8080   (admin@example.com / password by default)
#
# Services:
#   app       PHP-FPM (Laravel) — runs migrations+seed on first boot
#   web       Nginx, serves the dashboard on :8080
#   appdb     MySQL 8 — the monitor's own data (NOT the SALTO database)
#   queue     queue worker (delivers email + WhatsApp jobs)
#   scheduler runs `salto:check` on the configured interval

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - .:/var/www/html
    depends_on:
      appdb:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  appdb:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-salto_monitor}
      MYSQL_USER: ${DB_USERNAME:-salto}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - appdb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "33060:3306"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - app

volumes:
  appdb-data:
